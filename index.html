<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Fairy Tail Tier List PRO</title>
<style>
body { font-family: Arial; background:#0b0f1a; color:white; }
.container { padding:20px; }
.tier { margin-bottom:20px; padding:10px; border:1px solid #444; }
.character { padding:5px; margin:5px; background:#1a2238; cursor:grab; display:inline-block; }
.hidden { display:none; }
img { width:60px; display:block; }
</style>
</head>
<body>

<div class="container">
  <h1>🔥 Fairy Tail Tier List PRO</h1>

  <button onclick="show('tier')">Tier List</button>
  <button onclick="show('admin')">Admin</button>

  <!-- TIER -->
  <div id="tier">
    <h2>Drag & Drop Tier List</h2>
    <div class="tier" ondrop="drop(event,'S')" ondragover="allowDrop(event)">
      <h3>S</h3><div id="S"></div>
    </div>
    <div class="tier" ondrop="drop(event,'A')" ondragover="allowDrop(event)">
      <h3>A</h3><div id="A"></div>
    </div>
    <div class="tier" ondrop="drop(event,'B')" ondragover="allowDrop(event)">
      <h3>B</h3><div id="B"></div>
    </div>

    <h3>Characters</h3>
    <div id="pool"></div>
  </div>

  <!-- ADMIN -->
  <div id="admin" class="hidden">
    <h2>Admin</h2>
    <input id="name" placeholder="Nom">
    <input id="image" placeholder="URL image">
    <button onclick="addChar()">Ajouter</button>
  </div>
</div>

<script>
let chars = JSON.parse(localStorage.getItem('chars')) || [
  {name:'Natsu', image:''},
  {name:'Lucy', image:''}
];

function save(){
  localStorage.setItem('chars', JSON.stringify(chars));
}

function show(id){
  document.getElementById('tier').classList.add('hidden');
  document.getElementById('admin').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function render(){
  const pool = document.getElementById('pool');
  pool.innerHTML='';

  chars.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='character';
    div.draggable=true;
    div.ondragstart=(e)=>e.dataTransfer.setData('id',i);

    div.innerHTML=`
      ${c.image ? `<img src="${c.image}">` : ''}
      ${c.name}
      <br>
      <button onclick="deleteChar(${i})">❌</button>
    `;

    pool.appendChild(div);
  });
}

function deleteChar(index){
  if(!confirm("Supprimer ce personnage ?")) return;

  chars.splice(index,1);
  save();
  render();
}
  
function allowDrop(e){ e.preventDefault(); }

function drop(e,tier){
  e.preventDefault();
  const id=e.dataTransfer.getData('id');
  const c=chars[id];

  const div=document.createElement('div');
  div.className='character';
  div.innerHTML=`${c.image ? `<img src="${c.image}">` : ''}${c.name}`;

  document.getElementById(tier).appendChild(div);
}

function addChar(){
  const name=document.getElementById('name').value;
  const image=document.getElementById('image').value;

  if(!name) return alert('Nom requis');

  chars.push({name,image});
  save();
  render();
}

render();
</script>

</body>
</html>
